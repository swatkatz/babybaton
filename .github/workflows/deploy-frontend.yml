# .github/workflows/deploy-frontend.yml
name: Deploy Frontend
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - name: Get commit subject line
        id: msg
        run: echo "subject=$(git log -1 --pretty=%s | head -c 200)" >> "$GITHUB_OUTPUT"
      - run: eas update --channel preview --message "$COMMIT_MSG" --non-interactive
        env:
          COMMIT_MSG: ${{ steps.msg.outputs.subject }}
