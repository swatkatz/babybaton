# .github/workflows/eas-build.yml
#
# Builds a full native iOS/Android binary via EAS Build. Triggered manually when
# native dependencies change (new native modules, SDK upgrades, etc.). OTA updates
# can only push JS changes — if the native layer changed, you need a new binary.
# Also called by the Release workflow.
#
name: EAS Build
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]
      profile:
        description: 'Profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
      profile:
        type: string
        required: true

jobs:
  build:
    name: Build Native App
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
