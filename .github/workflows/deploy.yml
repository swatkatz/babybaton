# Runs after CI passes on main. Runs database migrations, deploys the backend to
# Railway, then deploys the web frontend (Railway) and native frontend (EAS OTA)
# in parallel. Also supports manual trigger via workflow_dispatch.
#
name: Deploy
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  migrate-and-deploy-backend:
    name: Migrate & Deploy Backend
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pending migrations
        run: ./scripts/migrate.sh "${{ secrets.DATABASE_PUBLIC_URL }}" ./migrations

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci --service ${{ secrets.BACKEND_SERVICE_ID }}

  deploy-frontend-web:
    name: Deploy Frontend (Railway)
    needs: migrate-and-deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci --service ${{ secrets.FRONTEND_SERVICE_ID }}

  deploy-frontend-native:
    name: Deploy Frontend (EAS OTA)
    needs: migrate-and-deploy-backend
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Get commit subject line
        id: msg
        run: echo "subject=$(git log -1 --pretty=%s | head -c 200)" >> "$GITHUB_OUTPUT"

      - run: eas update --channel preview --message "$COMMIT_MSG" --non-interactive
        env:
          COMMIT_MSG: ${{ steps.msg.outputs.subject }}
