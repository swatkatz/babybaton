# .github/workflows/preview.yml
name: PR Preview
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'frontend/**'

jobs:
  preview:
    name: Publish Preview
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci

      # --- Get the runtimeVersion from the latest preview build ---
      - name: Get latest build runtimeVersion
        id: build-info
        run: |
          raw=$(eas build:list --platform ios --profile preview --status finished --limit 1 --json --non-interactive 2>/dev/null || true)
          runtime_version=$(echo "$raw" | jq -r '.[0].runtimeVersion // empty' 2>/dev/null || true)
          echo "runtime_version=$runtime_version" >> "$GITHUB_OUTPUT"
          echo "Latest preview build runtimeVersion: $runtime_version"

      # --- Pin runtimeVersion in app.json to match the installed build ---
      - name: Override runtimeVersion in app.json
        if: steps.build-info.outputs.runtime_version != ''
        run: |
          jq --arg rv "${{ steps.build-info.outputs.runtime_version }}" \
            '.expo.runtimeVersion = $rv' app.json > app.json.tmp && mv app.json.tmp app.json
          echo "Set runtimeVersion to: $(jq -r '.expo.runtimeVersion' app.json)"

      # --- Publish update pinned to the build's runtimeVersion ---
      - name: Publish preview update
        if: steps.build-info.outputs.runtime_version != ''
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --branch pr-${{ github.event.pull_request.number }} --message "${{ format('PR #{0}', github.event.pull_request.number) }}"
          working-directory: frontend

      # --- Warn if native deps may have changed ---
      - name: Check for native dependency changes
        if: steps.build-info.outputs.runtime_version != ''
        id: native-check
        run: |
          native_changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- package.json package-lock.json app.json eas.json ios/ android/ | head -1)
          if [ -n "$native_changed" ]; then
            echo "native_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn about native changes
        if: steps.native-check.outputs.native_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ **This PR may include native dependency changes**',
                '',
                'If the app crashes after scanning the QR code, you need a new native build:',
                '',
                '```',
                'eas build --platform ios --profile preview',
                '```',
                '',
                'Or trigger one from the [EAS Build workflow](https://github.com/${{ github.repository }}/actions/workflows/eas-build.yml).',
                '',
                'Once the build finishes and is installed on your device, re-run this workflow.',
              ].join('\n'),
            });

      # --- Fallback if no preview build exists yet ---
      - name: No preview build found
        if: steps.build-info.outputs.runtime_version == ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ **No preview build found — QR code not available**',
                '',
                'No iOS preview build exists yet. Run a build first:',
                '',
                '```',
                'eas build --platform ios --profile preview',
                '```',
                '',
                'Or trigger one from the [EAS Build workflow](https://github.com/${{ github.repository }}/actions/workflows/eas-build.yml).',
                '',
                'Once the build finishes, re-run this workflow and the QR code will work.',
              ].join('\n'),
            });
